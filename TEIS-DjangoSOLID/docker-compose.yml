version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=tienda_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres

  [cite_start]web_django: # El Monolito (v1) [cite: 91]
    build: .
    # Se usa gunicorn para producción [cite: 11, 90]
    [cite_start]command: gunicorn Tienda.wsgi:application --bind 0.0.0.0:8000 [cite: 92]
    volumes:
      - [cite_start].:/app [cite: 99]
    depends_on:
      - [cite_start]db [cite: 102]
    environment:
      - [cite_start]DB_NAME=tienda_db [cite: 94]
      - [cite_start]DB_USER=postgres [cite: 113]
      - [cite_start]DB_PASSWORD=postgres [cite: 114]
      - [cite_start]DB_HOST=db [cite: 115]
      - [cite_start]DB_PORT=5432 [cite: 116]

  pagos_flask: # El Microservicio (v2) - EL ESTRANGULADOR
    build: ./microservicio_pagos 
    ports:
      - "5000:5000" # Expuesto solo para pruebas iniciales
    # Si este microservicio requiere la DB, podrías agregar depends_on: - db

  [cite_start]nginx: # El Cerebro del Tráfico [cite: 19]
    [cite_start]image: nginx:1.25-alpine [cite: 119]
    ports:
      - [cite_start]"80:80" # Nginx es el único que da la cara a internet [cite: 120]
    volumes:
      - [cite_start]./nginx/nginx.conf:/etc/nginx/conf.d/default.conf [cite: 127]
    depends_on:
      - web_django
      - pagos_flask

volumes:
  [cite_start]postgres_data: [cite: 134]