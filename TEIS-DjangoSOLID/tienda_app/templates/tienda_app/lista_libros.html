<!DOCTYPE html>
<html>
<head>
    <title>Tienda de Libros - Grado Empresarial</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            border-bottom: 3px solid #28a745;
            padding-bottom: 10px;
        }
        .libros {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .libro-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .libro-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .libro-card h2 {
            margin-top: 0;
            color: #333;
        }
        .precio {
            font-size: 24px;
            color: #28a745;
            font-weight: bold;
            margin: 10px 0;
        }
        .stock {
            font-size: 14px;
            color: #555;
            margin-bottom: 12px;
        }
        .comprar-btn {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s;
        }
        .comprar-btn:hover {
            background-color: #218838;
        }
        .sin-libros {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Tienda de Libros</h1>
        
        {% if libros %}
            <div class="libros">
                {% for libro in libros %}
                    <div class="libro-card">
                        <h2>{{ libro.titulo }}</h2>
                        <div class="precio">${{ libro.precio }}</div>
                        <div class="stock">Stock disponible: {{ libro.inventario.cantidad }}</div>
                        <a href="{% url 'finalizar_compra' libro.id %}" class="comprar-btn">
                            Comprar Ahora
                        </a>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="sin-libros">
                <p>No hay libros disponibles en este momento.</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
